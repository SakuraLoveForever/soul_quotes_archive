<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵鸡汤 - 交互式语录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: 700;
        }

        .quote-item {
            padding: 18px 24px;
            margin: 12px 0;
            border-left: 4px solid transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            background: rgba(255,255,255,0.7);
            border-radius: 8px;
            overflow: hidden;
        }

        .quote-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.4s ease;
            z-index: 0;
        }

        .quote-item:hover::before {
            width: 4px;
        }

        .quote-item:hover {
            background: rgba(255,255,255,0.95);
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
            border-left-color: #667eea;
        }

        .quote-text {
            font-size: 1.15em;
            line-height: 1.8;
            color: #444;
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
        }

        .quote-item:hover .quote-text {
            color: #2c3e50;
            font-size: 1.35em;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .category-title {
            font-size: 1.8em;
            color: #667eea;
            margin: 40px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 3px solid #667eea;
            font-weight: 700;
            position: relative;
        }

        .category-title::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
            font-size: 1.2em;
        }

        .error {
            text-align: center;
            color: #e74c3c;
            padding: 30px;
            font-size: 1.1em;
        }

        .quote-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 0.85em;
            margin-right: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .quote-item:hover .quote-number {
            transform: scale(1.2);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .stats {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8em;
            }
            .quote-item:hover {
                transform: translateX(5px) scale(1.01);
            }
            .quote-item:hover .quote-text {
                font-size: 1.15em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>心灵鸡汤</h1>
        <div class="stats" id="stats"></div>
        <div id="content">
            <div class="loading">正在加载语录...</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            textFile: '心灵鸡汤.md',
            refreshInterval: 5000
        };

        function parseContent(text) {
            const lines = text.split('\n');
            let html = '';
            let currentCategory = '';
            let quoteCount = 0;
            let categoryCount = 0;

            lines.forEach(line => {
                const trimmed = line.trim();

                // 跳过空行
                if (!trimmed) return;

                // 处理分类标题（# 开头）
                if (trimmed.startsWith('# ')) {
                    currentCategory = trimmed.substring(2);
                    html += `<h2 class="category-title">${currentCategory}</h2>`;
                    categoryCount++;
                    return;
                }

                // 跳过其他 markdown 标记行
                if (trimmed.startsWith('#') || trimmed.startsWith('>') || trimmed.startsWith('---')) {
                    return;
                }

                // 处理语录：匹配 "数字. 内容" 格式
                const match = trimmed.match(/^(\d+)\.\s*(.+)$/);
                if (match) {
                    const num = match[1];
                    const content = match[2];

                    html += `
                        <div class="quote-item">
                            <div class="quote-text">
                                <span class="quote-number">${num}</span>
                                ${content}
                            </div>
                        </div>
                    `;
                    quoteCount++;
                }
            });

            // 更新统计信息
            document.getElementById('stats').innerHTML = 
                `共收录 <strong>${categoryCount}</strong> 个分类，<strong>${quoteCount}</strong> 条语录`;

            return html;
        }

        async function loadContent() {
            const contentDiv = document.getElementById('content');

            try {
                const response = await fetch(CONFIG.textFile);

                if (!response.ok) {
                    throw new Error('无法加载文件，请确保 心灵鸡汤.md 与 index.html 在同一目录');
                }

                const text = await response.text();
                const html = parseContent(text);

                if (!html.trim()) {
                    throw new Error('文件内容为空或格式不正确');
                }

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <p>❌ ${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">
                            提示：由于浏览器安全限制，本地直接打开可能无法加载文件。<br>
                            建议使用本地服务器：运行 <code>python -m http.server 8000</code> 后访问 localhost:8000
                        </p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadContent);
        setInterval(loadContent, CONFIG.refreshInterval);
    </script>
</body>
</html>

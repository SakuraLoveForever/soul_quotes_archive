<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵鸡汤 - 交互式语录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- 引入 marked.js 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: 700;
        }

        .hint {
            text-align: center;
            color: #667eea;
            font-size: 0.95em;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            border: 1px dashed rgba(102, 126, 234, 0.3);
        }

        .hint::before {
            content: "💡 ";
        }

        /* 目录样式 */
        .toc {
            background: rgba(102, 126, 234, 0.08);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .toc-title {
            font-size: 1.3em;
            color: #667eea;
            margin-bottom: 12px;
            font-weight: 700;
            text-align: center;
        }

        .toc-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .toc-item {
            background: white;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.9em;
            color: #667eea;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .toc-item:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .stats {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .global-controls {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: inherit;
            transition: all 0.3s ease;
            margin: 0 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .category-section {
            margin: 30px 0;
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.5);
        }

        .category-title {
            font-size: 1.5em;
            color: #2c3e50;
            margin: 0;
            padding: 16px 24px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            transition: all 0.3s ease;
            user-select: none;
            border-bottom: 3px solid transparent;
        }

        .category-title:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .category-title::after {
            content: "▶";
            font-size: 0.8em;
            color: #667eea;
            transition: transform 0.3s ease;
        }

        .category-title.expanded::after {
            transform: rotate(90deg);
        }

        .category-title.expanded {
            border-bottom-color: #667eea;
        }

        .quotes-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        padding 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.3s ease;
            opacity: 0;
            padding: 0 24px;
        }

        .quotes-container.expanded {
            max-height: 50000px; /* 足够大的值以容纳内容 */
            opacity: 1;
            padding: 20px 24px;
        }

        .quote-item {
            padding: 14px 20px;
            margin: 10px 0;
            border-left: 4px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            background: rgba(255,255,255,0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        .quote-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            z-index: 0;
        }

        .quote-item:hover::before {
            width: 4px;
        }

        .quote-item:hover {
            background: rgba(255,255,255,0.95);
            transform: translateX(8px) scale(1.01);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.12);
            border-left-color: #667eea;
        }

        .quote-text {
            font-size: 1.1em;
            line-height: 1.8;
            color: #444;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .quote-item:hover .quote-text {
            color: #2c3e50;
            font-size: 1.15em;
            font-weight: 600;
        }

        /* Markdown 渲染样式 - 关键修复 */
        .quote-text blockquote {
            margin: 10px 0;
            padding: 12px 20px;
            background: rgba(102, 126, 234, 0.1);
            border-left: 4px solid #667eea;
            border-radius: 4px;
            font-style: italic;
            color: #555;
        }

        .quote-text blockquote p {
            margin: 0;
            line-height: 1.6;
        }

        .quote-text strong, .quote-text b {
            color: #667eea;
            font-weight: 700;
        }

        .quote-text em, .quote-text i {
            color: #764ba2;
            font-style: italic;
        }

        .quote-text code {
            background: rgba(102, 126, 234, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #667eea;
        }

        .quote-text pre {
            background: rgba(102, 126, 234, 0.1);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .quote-text pre code {
            background: none;
            padding: 0;
        }

        .quote-text ul, .quote-text ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .quote-text li {
            margin: 4px 0;
        }

        .quote-text a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px dashed #667eea;
        }

        .quote-text a:hover {
            border-bottom-style: solid;
        }

        .quote-text h1, .quote-text h2, .quote-text h3, .quote-text h4 {
            color: #667eea;
            margin: 10px 0;
        }

        .quote-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 0.85em;
            margin-right: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            flex-shrink: 0;
            vertical-align: top;
        }

        .quote-item:hover .quote-number {
            transform: scale(1.2);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
            font-size: 1.2em;
        }

        .error {
            text-align: center;
            color: #e74c3c;
            padding: 30px;
            font-size: 1.1em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8em;
            }
            .category-title {
                font-size: 1.2em;
                padding: 12px 16px;
            }
            .quote-item:hover {
                transform: translateX(4px) scale(1.005);
            }
            .quote-item:hover .quote-text {
                font-size: 1.05em;
            }
            .toc-list {
                gap: 6px;
            }
            .toc-item {
                padding: 5px 10px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>心灵鸡汤</h1>
        <div class="hint">点击分类标题可展开或收起该部分内容，点击目录可快速定位</div>

        <div class="global-controls">
            <button class="btn" onclick="expandAll()">全部展开</button>
            <button class="btn" onclick="collapseAll()">全部收起</button>
        </div>

        <!-- 目录区域 -->
        <div class="toc" id="toc" style="display: none;">
            <div class="toc-title">📚 目录导航</div>
            <div class="toc-list" id="toc-list"></div>
        </div>

        <div class="stats" id="stats"></div>
        <div id="content">
            <div class="loading">正在加载语录...</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            textFile: '心灵鸡汤.md',
            refreshInterval: 5000
        };

        // 配置 marked 选项 - 关键配置确保正确渲染
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: false,
            mangle: false,
            sanitize: false,
            smartLists: true,
            smartypants: true
        });

        let categories = []; // 存储分类信息用于目录

        function parseContent(text) {
            const lines = text.split('\n');
            let html = '';
            let currentCategory = '';
            let currentQuotes = [];
            let quoteCount = 0;
            let categoryCount = 0;
            categories = []; // 重置分类数组

            lines.forEach(line => {
                const trimmed = line.trim();

                // 跳过空行
                if (!trimmed) return;

                // 处理分类标题（# 开头）- 支持一级和二级标题
                if (trimmed.match(/^#{1,2}\s/)) {
                    // 保存上一个分类的内容
                    if (currentCategory && currentQuotes.length > 0) {
                        const catId = `category-${categoryCount}`;
                        html += createCategorySection(currentCategory, currentQuotes, catId);
                        categories.push({ name: currentCategory, id: catId });
                        currentQuotes = [];
                    }
                    // 移除 # 符号获取标题
                    currentCategory = trimmed.replace(/^#{1,2}\s*/, '');
                    categoryCount++;
                    return;
                }

                // 跳过分隔符
                if (trimmed.startsWith('---')) {
                    return;
                }

                // 处理语录：匹配 "数字. 内容" 格式
                const match = trimmed.match(/^(\d+)\.\s*(.+)$/);
                if (match && currentCategory) {
                    const num = match[1];
                    const content = match[2];
                    currentQuotes.push({ num, content });
                    quoteCount++;
                }
            });

            // 处理最后一个分类
            if (currentCategory && currentQuotes.length > 0) {
                const catId = `category-${categoryCount}`;
                html += createCategorySection(currentCategory, currentQuotes, catId);
                categories.push({ name: currentCategory, id: catId });
            }

            // 更新统计信息
            document.getElementById('stats').innerHTML = 
                `共收录 <strong>${categoryCount}</strong> 个分类，<strong>${quoteCount}</strong> 条语录`;

            // 生成目录
            generateTOC();

            return html;
        }

        function generateTOC() {
            const tocContainer = document.getElementById('toc');
            const tocList = document.getElementById('toc-list');

            if (categories.length === 0) {
                tocContainer.style.display = 'none';
                return;
            }

            tocList.innerHTML = categories.map(cat => 
                `<a class="toc-item" onclick="jumpToCategory('${cat.id}')">${cat.name}</a>`
            ).join('');

            tocContainer.style.display = 'block';
        }

        function jumpToCategory(categoryId) {
            const element = document.getElementById(categoryId);
            const title = document.getElementById(`title-${categoryId}`);

            if (element && title) {
                // 展开该分类
                element.classList.add('expanded');
                title.classList.add('expanded');

                // 滚动到该分类
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });

                // 高亮闪烁效果
                title.style.background = 'linear-gradient(135deg, rgba(102, 126, 234, 0.4) 0%, rgba(118, 75, 162, 0.4) 100%)';
                setTimeout(() => {
                    title.style.background = '';
                }, 1000);
            }
        }

        function createCategorySection(category, quotes, categoryId) {
            let quotesHtml = '';

            quotes.forEach(quote => {
                // 使用 marked.parseInline 或 marked.parse 渲染 Markdown
                // 使用 parseInline 避免外层包裹 p 标签，但如果有复杂内容使用 parse
                let renderedContent;
                if (quote.content.includes('>') || quote.content.includes('**') || quote.content.includes('*') || quote.content.includes('`')) {
                    renderedContent = marked.parse(quote.content);
                } else {
                    renderedContent = marked.parseInline(quote.content);
                }

                quotesHtml += `
                    <div class="quote-item">
                        <div class="quote-text">
                            <span class="quote-number">${quote.num}</span>
                            <span class="quote-content">${renderedContent}</span>
                        </div>
                    </div>
                `;
            });

            return `
                <div class="category-section" id="section-${categoryId}">
                    <h2 class="category-title" onclick="toggleCategory('${categoryId}')" id="title-${categoryId}">
                        ${category}
                    </h2>
                    <div class="quotes-container" id="${categoryId}">
                        ${quotesHtml}
                    </div>
                </div>
            `;
        }

        function toggleCategory(categoryId) {
            const container = document.getElementById(categoryId);
            const title = document.getElementById(`title-${categoryId}`);

            if (container.classList.contains('expanded')) {
                container.classList.remove('expanded');
                title.classList.remove('expanded');
            } else {
                container.classList.add('expanded');
                title.classList.add('expanded');
            }
        }

        function expandAll() {
            document.querySelectorAll('.quotes-container').forEach(el => {
                el.classList.add('expanded');
            });
            document.querySelectorAll('.category-title').forEach(el => {
                el.classList.add('expanded');
            });
        }

        function collapseAll() {
            document.querySelectorAll('.quotes-container').forEach(el => {
                el.classList.remove('expanded');
            });
            document.querySelectorAll('.category-title').forEach(el => {
                el.classList.remove('expanded');
            });
        }

        async function loadContent() {
            const contentDiv = document.getElementById('content');

            try {
                const response = await fetch(CONFIG.textFile);

                if (!response.ok) {
                    throw new Error('无法加载文件，请确保 心灵鸡汤.md 与 index.html 在同一目录');
                }

                const text = await response.text();
                const html = parseContent(text);

                if (!html.trim()) {
                    throw new Error('文件内容为空或格式不正确');
                }

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <p>❌ ${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">
                            提示：由于浏览器安全限制，本地直接打开可能无法加载文件。<br>
                            建议使用本地服务器：运行 <code>python -m http.server 8000</code> 后访问 localhost:8000
                        </p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadContent);
        setInterval(loadContent, CONFIG.refreshInterval);
    </script>
</body>
</html>
